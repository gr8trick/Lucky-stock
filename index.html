<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Stock - Compact</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqa2j_tXrwLL21QZtcyxbsmteie2RfcoA",
            authDomain: "lucky-telecom-stock.firebaseapp.com",
            projectId: "lucky-telecom-stock",
            storageBucket: "lucky-telecom-stock.firebasestorage.app",
            messagingSenderId: "1004945905378",
            appId: "1:1004945905378:web:0f33ebaaedac783f43b0bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.inventoryData = { locations: [], stock: {} };
        window.currentLoc = "ALL"; 
        window.selectedBrand = "ALL";

        onSnapshot(doc(db, "business", "main_stock"), (docSnap) => {
            if (docSnap.exists()) {
                window.inventoryData = docSnap.data();
                renderApp();
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-header { background: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Chota and Pill style brand filter */
        .brand-pill {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
        }
        .brand-pill.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }

        .shop-tab { position: relative; padding-bottom: 8px; }
        .shop-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="glass-header text-white sticky top-0 z-[100] shadow-md">
        <div class="px-5 py-4 flex justify-between items-center">
            <h1 class="text-lg font-black tracking-tight">LUCKY <span class="text-blue-400">STOCK</span></h1>
            <div id="syncTime" class="text-[8px] font-bold opacity-50 uppercase tracking-widest">Updating...</div>
        </div>
        
        <div id="shopTabs" class="flex overflow-x-auto px-5 gap-6 no-scrollbar text-[10px] font-black uppercase text-slate-400"></div>
    </header>

    <main class="py-4">
        <div class="mb-4">
            <div id="brandList" class="flex overflow-x-auto px-4 gap-2 no-scrollbar">
                </div>
        </div>

        <div class="px-4 space-y-4">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search" oninput="renderApp()" placeholder="Search mobile..." 
                    class="w-full pl-11 pr-4 py-3 bg-white shadow-sm rounded-xl outline-none border border-slate-100 font-medium text-sm">
            </div>

            <div id="stockList" class="space-y-2 pb-24"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 px-6 flex justify-between items-center z-50">
        <div>
            <p class="text-[9px] font-black text-slate-400 uppercase">Selected Stock</p>
            <p id="totalQty" class="text-lg font-black text-slate-900">0 <span class="text-[10px] text-slate-400 font-bold">PCS</span></p>
        </div>
        <div class="bg-blue-600 px-5 py-2 rounded-xl">
            <p id="activeBrandName" class="text-[10px] font-black text-white uppercase tracking-widest">ALL</p>
        </div>
    </div>

    <script>
        function renderApp() {
            const shopCont = document.getElementById('shopTabs');
            const brandCont = document.getElementById('brandList');
            const listCont = document.getElementById('stockList');
            const searchQuery = document.getElementById('search').value.toLowerCase();

            let brandsSet = new Set();
            let filteredItems = [];
            
            // Logic: Filter and Collect
            window.inventoryData.locations.forEach(loc => {
                (window.inventoryData.stock[loc] || []).forEach(item => {
                    const brand = item.name.split(' ')[0].toUpperCase();
                    brandsSet.add(brand);
                    
                    const matchLoc = (window.currentLoc === "ALL" || window.currentLoc === loc);
                    const matchBrand = (window.selectedBrand === "ALL" || brand === window.selectedBrand);
                    const matchSearch = item.name.toLowerCase().includes(searchQuery);

                    if(matchLoc && matchBrand && matchSearch) {
                        filteredItems.push({...item, locName: loc});
                    }
                });
            });

            // 1. Render Shop Tabs
            let shopHtml = `<button onclick="window.currentLoc='ALL'; renderApp()" class="shop-tab whitespace-nowrap ${window.currentLoc === 'ALL' ? 'active text-white' : ''}">ALL STORES</button>`;
            window.inventoryData.locations.forEach(loc => {
                shopHtml += `<button onclick="window.currentLoc='${loc}'; renderApp()" class="shop-tab whitespace-nowrap ${window.currentLoc === loc ? 'active text-white' : ''}">${loc}</button>`;
            });
            shopCont.innerHTML = shopHtml;

            // 2. Render Brand Pills (Chota View)
            let brandHtml = `<button onclick="window.selectedBrand='ALL'; renderApp()" class="brand-pill ${window.selectedBrand === 'ALL' ? 'active' : ''}">ALL</button>`;
            Array.from(brandsSet).sort().forEach(b => {
                brandHtml += `<button onclick="window.selectedBrand='${b}'; renderApp()" class="brand-pill ${window.selectedBrand === b ? 'active' : ''}">${b}</button>`;
            });
            brandCont.innerHTML = brandHtml;

            // 3. Render List
            let finalQty = 0;
            listCont.innerHTML = filteredItems.length ? filteredItems.map(item => {
                finalQty += item.qty;
                return `
                <div class="bg-white p-3.5 rounded-2xl border border-slate-100 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center font-black text-[10px] text-blue-600 border border-slate-100">
                            ${item.name.split(' ')[0].substring(0,2)}
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800 text-xs uppercase">${item.name}</h4>
                            <div class="flex items-center gap-2 mt-0.5">
                                <span class="text-[8px] font-black text-blue-500 uppercase bg-blue-50 px-1.5 py-0.5 rounded">${item.locName}</span>
                                <span class="text-[9px] font-bold text-slate-400">₹${item.price.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-900 text-white px-3 py-1 rounded-lg font-black text-[11px]">
                        ${item.qty}
                    </div>
                </div>`;
            }).join('') : `<div class="py-20 text-center text-slate-300 font-bold uppercase text-[9px] tracking-widest">No stock found</div>`;

            document.getElementById('totalQty').innerText = finalQty;
            document.getElementById('activeBrandName').innerText = window.selectedBrand;
            document.getElementById('syncTime').innerText = "Last Sync: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
    </script>
</body>
</html>
