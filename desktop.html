<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockPro Cloud - Desktop & Tab Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Custom Scrollbar for Desktop feel */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .no-scr::-webkit-scrollbar { display: none; }
        .pill-active { background-color: #4f46e5; color: #fff; border-color: #4f46e5; }
        .tag-active { background-color: #10b981; color: #fff; border-color: #10b981; }
        .btn-active:active { transform: scale(0.97); transition: transform 0.1s; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="pb-24 select-none">

    <nav class="glass-nav sticky top-0 z-50 px-4 sm:px-6 py-3 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
            <h1 class="font-black text-indigo-600 text-xl tracking-tight flex items-center gap-2">
                <i class="fas fa-layer-group"></i> lucky stock pro
            </h1>
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-between md:justify-end">
                <span id="topSyncStatus" class="text-gray-400 text-[11px] font-bold flex items-center gap-1"><i class="fas fa-cloud"></i> Offline</span>
                
                <div class="flex gap-2">
                    <button onclick="openGlobalAG('aaya')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-4 py-2 border border-emerald-200 rounded-xl font-bold shadow-sm flex items-center gap-2 text-xs transition-colors btn-active"><i class="fas fa-download"></i> Aaya Entry</button>
                    <button onclick="openGlobalAG('gaya')" class="bg-rose-50 hover:bg-rose-100 text-rose-700 px-4 py-2 border border-rose-200 rounded-xl font-bold shadow-sm flex items-center gap-2 text-xs transition-colors btn-active"><i class="fas fa-upload"></i> Gaya Entry</button>

                <div class="flex gap-2">

                    </button>

    <script>
        let raw = localStorage.getItem('stockpro_v19');
        let db = raw ? JSON.parse(raw) : { s: [], f: [], t: [], pt: [] };
        if(!db.s) db.s = []; if(!db.f) db.f = []; if(!db.t) db.t = [];
        if(!db.pt) db.pt = []; 
        if(!db.h) db.h = []; if(!db.r) db.r = [];
        
        let cur = 'all', selIdx = null, selProdName = null, selBrand = ''; 
        let activeTags = [], addDist = {};
        let fbDoc = null, isPushing = false, fbTimeout = null;

        let hashShop = decodeURIComponent(window.location.hash.substring(1).toLowerCase());
        let isLocked = false;
        let validSelectedProduct = ""; 

        const $ = i => document.getElementById(i);
        
        function checkHash() {
            hashShop = decodeURIComponent(window.location.hash.substring(1).toLowerCase());
            if(hashShop && db.s.length > 0) {
                let idx = db.s.findIndex(s => s.n.toLowerCase() === hashShop);
                if(idx > -1) { cur = idx; isLocked = true; } 
                else { isLocked = false; cur = 'all'; }
            } else { isLocked = false; }
        }

        window.addEventListener("hashchange", () => { selBrand=''; checkHash(); render(); });

        function commitAction(desc, actionFn) {
            if(!db.h) db.h = [];
            let backupState = JSON.stringify({ s: db.s, pt: db.pt }); 
            actionFn(); 
            let dateStr = new Date().toISOString().split('T')[0];
            let timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            db.h.push({ date: dateStr, time: timeStr, desc: desc, state: backupState });
            if(db.h.length > 50) db.h.shift(); 
            db.r = []; 
            save();
        }

        function undo() {
            if(!db.h || db.h.length === 0) return alert("Kuch undo karne ke liye nahi hai!");
            if(!db.r) db.r = [];
            let currentState = JSON.stringify({ s: db.s, pt: db.pt });
            let lastAction = db.h.pop();
            db.r.push({ date: lastAction.date, time: lastAction.time, desc: lastAction.desc, state: currentState });
            let parsed = JSON.parse(lastAction.state);
            db.s = parsed.s; db.pt = parsed.pt || [];
            save(); renderHistUI();
        }

        function redo() {
            if(!db.r || db.r.length === 0) return alert("Kuch redo karne ke liye nahi hai!");
            if(!db.h) db.h = [];
            let currentState = JSON.stringify({ s: db.s, pt: db.pt });
            let nextAction = db.r.pop();
            db.h.push({ date: nextAction.date, time: nextAction.time, desc: nextAction.desc, state: currentState });
            let parsed = JSON.parse(nextAction.state);
            db.s = parsed.s; db.pt = parsed.pt || [];
            save(); renderHistUI();
        }

        function toggleHist() { 
            $('hM').classList.toggle('hidden'); 
            if(!$('hM').classList.contains('hidden')) renderHistUI();
        }

        function renderHistUI() {
            let list = "";
            if(!db.h || db.h.length === 0) {
                list = `<div class="text-center p-6 text-gray-400"><i class="fas fa-clipboard-list text-4xl mb-3 text-gray-300"></i><br><span class="text-sm">Koi Activity Nahi Hui</span></div>`;
            } else {
                let reversedH = [...db.h].reverse();
                list = reversedH.map((h) => {
                    let isSell = h.desc.includes('SOLD');
                    let isDist = h.desc.includes('BANTWARA');
                    let isEdit = h.desc.includes('Update Product');
                    let icon = 'fa-exchange-alt text-gray-400';
                    let bg = 'bg-white'; let textCol = 'text-gray-800';
                    
                    if(h.desc.includes('AAYA') || h.desc.includes('Accepted')) { icon = 'fa-download text-emerald-500'; bg = 'bg-emerald-50/70 border-emerald-100'; textCol = 'text-emerald-900'; }
                    if(h.desc.includes('GAYA') || h.desc.includes('Pending')) { icon = 'fa-upload text-rose-500'; bg = 'bg-rose-50/70 border-rose-100'; textCol = 'text-rose-900'; }
                    if(h.desc.includes('Rejected')) { icon = 'fa-times text-red-500'; bg = 'bg-red-50/70 border-red-100'; textCol = 'text-red-900'; }
                    if(isSell) { icon = 'fa-shopping-cart text-blue-500'; bg = 'bg-blue-50/70 border-blue-100'; textCol = 'text-blue-900'; }
                    if(isDist) { icon = 'fa-share-alt text-purple-500'; bg = 'bg-purple-50/70 border-purple-100'; textCol = 'text-purple-900'; }
                    if(isEdit) { icon = 'fa-edit text-indigo-500'; bg = 'bg-indigo-50/70 border-indigo-100'; textCol = 'text-indigo-900'; }

                    return `
                    <div class="${bg} p-4 rounded-xl border shadow-sm flex items-start gap-3 transition-all">
                        <div class="mt-0.5 bg-white p-2 rounded-lg shadow-sm border border-gray-100"><i class="fas ${icon}"></i></div>
                        <div class="flex-1">
                            <p class="font-bold ${textCol} text-sm leading-snug">${h.desc}</p>
                            <p class="text-[11px] text-gray-500 mt-1 font-semibold flex items-center gap-1"><i class="far fa-calendar-alt"></i> ${h.date} &nbsp;<i class="far fa-clock"></i> ${h.time}</p>
                        </div>
                    </div>`;
                }).join('');
            }
            $('histList').innerHTML = list;
        }

        function exportData() {
            let exportObj = { items: [] }; let grouped = {};
            db.s.forEach(shop => {
                shop.i.forEach(item => {
                    if(!grouped[item.n]) grouped[item.n] = { name: item.n, brand: item.b || "", price: item.p || "", shops: {}, tags: item.tg || [], ex: item.ex || {} };
                    if(item.q > 0) grouped[item.n].shops[shop.n] = item.q;
                });
            });
            exportObj.items = Object.values(grouped);
            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj, null, 2));
            let dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "StockPro_Backup_" + new Date().toISOString().split('T')[0] + ".json"); dl.click();
        }

        function importData(e) {
            let file = e.target.files[0]; if(!file) return; let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let data = JSON.parse(e.target.result);
                    if(!data.items || !Array.isArray(data.items)) throw "Invalid format";
                    
                    let isReplace = confirm("Kya aap existing stock ko is nayi file ke hisaab se UPDATE (Replace) karna chahte hain?\n\n[OK] = Daily Sync (Purana stock overwrite ho jayega)\n[Cancel] = Add Stock (Naya stock purane me plus hoga)");

                    commitAction(`Imported ${data.items.length} items from File`, () => {
                        if(isReplace) db.s.forEach(shop => shop.i.forEach(item => item.q = 0));

                        data.items.forEach(item => {
                            if(!item.name || !item.shops) return;
                            if(item.tags && Array.isArray(item.tags)) item.tags.forEach(t => { if(!db.t.includes(t)) db.t.push(t); });
                            
                            Object.keys(item.shops).forEach(shopName => {
                                let qty = parseInt(item.shops[shopName]); if(isNaN(qty) || qty <= 0) return;
                                let shop = db.s.find(s => s.n === shopName);
                                if(!shop) { shop = { n: shopName, i: [] }; db.s.push(shop); }
                                
                                let exItem = shop.i.find(x => x.n === item.name);
                                if(exItem) {
                                    if(isReplace) exItem.q = qty; else exItem.q += qty; 
                                    if(item.price) exItem.p = item.price; if(item.brand) exItem.b = item.brand;
                                    if(item.tags) exItem.tg = item.tags; if(item.ex) exItem.ex = item.ex;
                                } else shop.i.push({ n: item.name, p: item.price || "", b: item.brand || "", q: qty, ex: item.ex || {}, tg: item.tags || [] });
                            });
                        });
                        if(isReplace) db.s.forEach(shop => shop.i = shop.i.filter(item => item.q > 0));
                    });
                    alert(`Stock Successfully ${isReplace ? 'Updated/Synced' : 'Added'}!`); buildSettings();
                } catch(err) { alert("Error: JSON File format sahi nahi hai!"); }
                $('importFile').value = ''; 
            };
            reader.readAsText(file);
        }

            let grouped = {};
            db.s.forEach(shop => shop.i.forEach(item => {
                if(item.n.toLowerCase().includes(term) || (item.b && item.b.toLowerCase().includes(term))) {
                    if(!grouped[item.n]) grouped[item.n] = item; 
                }
            }));

            let results = Object.values(grouped);
            if(results.length === 0) {
                dropdown.innerHTML = `<div class="p-4 text-xs text-gray-500 text-center font-bold">New Product Banega <i class="fas fa-plus-circle text-indigo-400 ml-1"></i></div>`;
            } else {
                dropdown.innerHTML = results.map(x => `

                    addDist[idx] = f ? f.q : 0;

        function toggleAddTag(tag) { activeTags.includes(tag)? activeTags=activeTags.filter(t=>t!==tag) : activeTags.push(tag); renderAddTags(); }

            let brand = $('p_brand').value.trim();

            commitAction(`Update Product / Added: ${name}`, () => {

        function stepDist(targetIdx, step) {
            let srcIdx = parseInt($('distSource').value);
            let srcShop = db.s[srcIdx];
            let srcItem = srcShop.i.find(x => x.n === selProdName);
            let srcAvail = srcItem ? srcItem.q : 0;

            let currentTotalDist = Object.values(distValues).reduce((a, b) => a + b, 0);
            let currentVal = distValues[targetIdx];
            let newVal = currentVal + step;

            if(newVal < 0) return;
            if(step > 0 && (currentTotalDist + step) > srcAvail) {
                alert(`Bantwara Limit Cross! '${srcShop.n}' mein sirf ${srcAvail} piece bache hain.`);
                return;
            }
            
            distValues[targetIdx] = newVal;
            $(`distQty_${targetIdx}`).value = newVal;
        }

        function confirmDist() {
            let srcIdx = parseInt($('distSource').value);
            let srcShop = db.s[srcIdx];
            let srcItem = srcShop.i.find(x => x.n === selProdName);
            
            if(!srcItem) return;

            let totalToDistribute = Object.values(distValues).reduce((a, b) => a + b, 0);
            if(totalToDistribute === 0) return alert("Kam se kam 1 piece toh select kijiye baantne ke liye!");
            if(totalToDistribute > srcItem.q) return alert("Source shop mein itna stock nahi hai!");

            let date = new Date().toISOString().split('T')[0];
            
            let actionFn = () => {
                srcItem.q -= totalToDistribute;
                Object.keys(distValues).forEach(tIdx => {
                    let qty = distValues[tIdx];
                    if(qty > 0) {
                        let toShop = db.s[tIdx];
                        let toItem = toShop.i.find(x => x.n === selProdName);
                        if(toItem) toItem.q += qty;
                        else {
                            let clone = JSON.parse(JSON.stringify(srcItem));
                            clone.q = qty;
                            toShop.i.push(clone);
                        }
                    }
                });
            };

            let destNames = Object.keys(distValues).filter(k => distValues[k]>0).map(k => `${db.s[k].n}(${distValues[k]})`).join(', ');
            commitAction(`[${date}] BANTWARA: ${totalToDistribute}x ${selProdName} | ${srcShop.n} ➡️ ${destNames}`, actionFn);
            closeM('actM');
        }

        function confirmAG() {
            let qty = parseInt($('agQty').value);
            let date = $('agDate').value;
            let otherShopIdx = parseInt($('agShopSelect').value);
            
            if(isNaN(qty) || qty <= 0) return alert("Sahi quantity dalein!");
            if(!date) return alert("Date select karein!");

            let myShop = db.s[cur];
            let itemInMyShop = myShop.i[selIdx];

            if(agMode === 'gaya' && qty > itemInMyShop.q) {
                return alert(`Galat Entry! '${myShop.n}' ke paas bas ${itemInMyShop.q} item hai.`);
            }

            let actionFn = () => {};
            let desc = "";

            if(agMode === 'gaya') {
                if(otherShopIdx !== -1) {
                    actionFn = () => {
                        itemInMyShop.q -= qty;
                        db.pt.push({ id: Date.now(), d: date, p: selProdName, q: qty, f: cur, t: otherShopIdx });
                    };
                    desc = `GAYA (Pending): ${qty}x ${selProdName} | ${myShop.n} ➡️ ${db.s[otherShopIdx].n}`;
                } else {
                    actionFn = () => { itemInMyShop.q -= qty; };
                    desc = `GAYA (Out): ${qty}x ${selProdName} from ${myShop.n}`;
                }
            } else { 
                if(otherShopIdx !== -1) {
                    let itemInOther = db.s[otherShopIdx].i.find(x => x.n === selProdName);
                    if(!itemInOther || itemInOther.q < qty) return alert(`Galat Entry! '${db.s[otherShopIdx].n}' ke paas itna stock nahi hai.`);
                    actionFn = () => {
                        itemInOther.q -= qty;
                        itemInMyShop.q += qty;
                    };
                    desc = `AAYA: ${qty}x ${selProdName} | ${db.s[otherShopIdx].n} ➡️ ${myShop.n}`;
                } else {
                    actionFn = () => { itemInMyShop.q += qty; };
                    desc = `AAYA (New): ${qty}x ${selProdName} in ${myShop.n}`;
                }
            }

            commitAction(`[${date}] ${desc}`, actionFn);
            closeM('actM');
        }

        function confirmGlobalAG() {
            if(!validSelectedProduct || $('gagProduct').value !== validSelectedProduct) {
                return alert("Sirf dropdown list me se product select karein! Apne man se naya naam allow nahi hai.");
            }

            let pName = validSelectedProduct;
            let date = $('gagDate').value;
            let qty = parseInt($('gagQty').value);
            let fromIdx = parseInt($('gagFrom').value);
            let toIdx = parseInt($('gagTo').value);

            if(!pName || !date || isNaN(qty) || qty <= 0) return alert("Sahi details dalein!");
            if(fromIdx === toIdx) return alert("From aur To same shop nahi ho sakte!");

            let fromShop = fromIdx > -1 ? db.s[fromIdx] : null;
            let toShop = toIdx > -1 ? db.s[toIdx] : null;

            let existingItemInFrom = null;
            if(fromShop) {
                existingItemInFrom = fromShop.i.find(x => x.n === pName);
                if(!existingItemInFrom || existingItemInFrom.q < qty) {
                    return alert(`Galat Entry! '${fromShop.n}' ke paas '${pName}' ka sirf ${existingItemInFrom ? existingItemInFrom.q : 0} piece stock hai.`);
                }
            }

            let actionFn = () => {};
            let fName = fromShop ? fromShop.n : "Supplier";
            let tName = toShop ? toShop.n : "Outside";
            let desc = "";

            if(gMode === 'gaya' && toShop) {
                actionFn = () => {
                    if(existingItemInFrom) existingItemInFrom.q -= qty;
                    db.pt.push({ id: Date.now(), d: date, p: pName, q: qty, f: fromIdx, t: toIdx });
                };
                desc = `GAYA (Pending): ${qty}x ${pName} | ${fName} ➡️ ${tName}`;
            } else {
                let baseItemInfo = { n: pName, b: "", p: "", q: 0, tg: [], ex: {} };
                let foundAnywhere = null;
                db.s.forEach(s => { let f = s.i.find(x => x.n === pName); if(f && !foundAnywhere) foundAnywhere = f; });
                if(foundAnywhere) { baseItemInfo = JSON.parse(JSON.stringify(foundAnywhere)); baseItemInfo.q = 0; }

                actionFn = () => {
                    if(fromShop && existingItemInFrom) existingItemInFrom.q -= qty;
                    if(toShop) {
                        let existingItemInTo = toShop.i.find(x => x.n === pName);
                        if(existingItemInTo) existingItemInTo.q += qty;
                        else { baseItemInfo.q = qty; toShop.i.push(baseItemInfo); }
                    }
                };
                let typeLabel = gMode === 'aaya' ? 'AAYA' : 'GAYA';
                desc = `${typeLabel}: ${qty}x ${pName} | ${fName} ➡️ ${tName}`;
            }
            
            commitAction(`[${date}] ${desc}`, actionFn);
            closeM('gagM');
        }

        function resolveTransfer(ptId, isAccepted) {
            let idx = db.pt.findIndex(t => t.id === ptId);
            if(idx === -1) return;
            let t = db.pt[idx];
            let fromShop = db.s[t.f];
            let toShop = db.s[t.t];

            if(isAccepted) {
                let actionFn = () => {
                    let existing = toShop.i.find(x => x.n === t.p);
                    if(existing) existing.q += t.q;
                    else {
                        let base = null;
                        db.s.forEach(s => { let f = s.i.find(x => x.n === t.p); if(f && !base) base = JSON.parse(JSON.stringify(f)); });
                        if(base) { base.q = t.q; toShop.i.push(base); } else { toShop.i.push({n:t.p, q:t.q}); }
                    }
                    db.pt.splice(idx, 1);
                };
                commitAction(`[${t.d}] Accepted AAYA: ${t.q}x ${t.p} | ${fromShop.n} ➡️ ${toShop.n}`, actionFn);
            } else {
                let actionFn = () => {
                    let existing = fromShop.i.find(x => x.n === t.p);
                    if(existing) existing.q += t.q; 
                    db.pt.splice(idx, 1);
                };
                commitAction(`[${t.d}] Rejected GAYA: Returned ${t.q}x ${t.p} to ${fromShop.n}`, actionFn);
            }
        }

                bHtml += bKeys.map(b => `<button onclick="selBrand='${b.replace(/'/g,"\\'")}';render()" class="px-5 py-2 rounded-full whitespace-nowrap text-xs font-black border transition-all flex items-center gap-2 shadow-sm ${selBrand===b?'bg-slate-800 text-white border-slate-800':'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}">${b} <span class="${selBrand===b?'bg-slate-600 text-white':'bg-gray-100 text-gray-500'} px-2 py-0.5 rounded-full text-[10px]">${brandCounts[b]}</span></button>`).join('');
                $('brandTabs').innerHTML = bHtml;
                $('brandTabs').classList.remove('hidden');
            } else {
                $('brandTabs').innerHTML = ''; $('brandTabs').classList.add('hidden');
            }
            
            renderPendingUI();
            renderStock();
        }
        
        render();
    </script>
</body>
</html>
