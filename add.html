<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Admin Pro - Smooth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqa2j_tXrwLL21QZtcyxbsmteie2RfcoA",
            authDomain: "lucky-telecom-stock.firebaseapp.com",
            projectId: "lucky-telecom-stock",
            storageBucket: "lucky-telecom-stock.firebasestorage.app",
            messagingSenderId: "1004945905378",
            appId: "1:1004945905378:web:0f33ebaaedac783f43b0bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.inventoryData = { locations: [], stock: {} };
        window.tempAdjustments = {}; 
        window.isSaving = false; // Glitch prevention flag

        onSnapshot(doc(db, "business", "main_stock"), (docSnap) => {
            if (docSnap.exists() && !window.isSaving) {
                window.inventoryData = docSnap.data();
                renderAdjustmentGrid(document.getElementById('pName').value);
            }
        });

        window.saveToFirebase = async (newData) => {
            window.isSaving = true;
            try {
                await setDoc(doc(db, "business", "main_stock"), newData);
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            background-color: #f1f5f9;
        }
        .qty-btn { transition: transform 0.1s active; }
        .qty-btn:active { transform: scale(0.9); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .success-card { display: none; transform: translateY(20px); transition: all 0.3s ease; }
        .success-card.show { display: flex; transform: translateY(0); }
    </style>
</head>
<body class="text-slate-900 pb-40">

    <nav class="glass-nav text-white p-5 sticky top-0 z-[100] shadow-xl">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <div>
                <h1 class="font-black text-lg tracking-tighter">LUCKY <span class="text-blue-400">ADMIN</span></h1>
                <p class="text-[8px] font-bold opacity-60 uppercase tracking-widest">Master Inventory Pro</p>
            </div>
            <div id="syncDot" class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-4">
        
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200">
            <div class="space-y-4">
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-1">Product Details</label>
                    <input type="text" id="pName" oninput="handleSearch(this.value)" placeholder="SEARCH MODEL..." autocomplete="off"
                        class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-extrabold text-lg uppercase border-2 border-transparent focus:border-blue-500 transition-all placeholder:text-slate-300">
                    
                    <div id="suggestBox" class="hidden absolute left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-[110] max-h-60 overflow-y-auto"></div>
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-blue-500 text-lg">₹</span>
                    <input type="number" id="pPrice" placeholder="SET RATE" class="w-full pl-10 pr-4 py-4 bg-slate-50 rounded-2xl outline-none font-extrabold text-lg border-2 border-transparent focus:border-blue-500 transition-all">
                </div>
            </div>
        </div>

        <div id="adjustmentContainer" class="space-y-3">
            </div>

    </main>

    <div id="successCard" class="fixed inset-x-4 bottom-28 max-w-xl mx-auto success-card bg-green-600 text-white p-4 rounded-3xl items-center justify-center gap-3 shadow-2xl z-[120]">
        <i class="fas fa-check-circle text-xl"></i>
        <span class="font-black uppercase text-sm tracking-widest">Stock Successfully Synced!</span>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-100 via-slate-100 to-transparent z-[90]">
        <button onclick="commitChanges()" id="saveBtn" class="max-w-xl mx-auto w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 border-4 border-white">
            <i class="fas fa-layer-group"></i>
            SAVE ALL CHANGES
        </button>
    </div>

    <script>
        function handleSearch(val) {
            const box = document.getElementById('suggestBox');
            if (!val) { box.classList.add('hidden'); renderAdjustmentGrid(""); return; }

            const query = val.toUpperCase();
            let matches = new Set();
            
            window.inventoryData.locations.forEach(loc => {
                (window.inventoryData.stock[loc] || []).forEach(item => {
                    if (item.name.includes(query)) matches.add(JSON.stringify({name: item.name, price: item.price}));
                });
            });

            if (matches.size > 0) {
                box.innerHTML = Array.from(matches).map(mStr => {
                    const m = JSON.parse(mStr);
                    return `<div onclick="selectProduct('${m.name}', ${m.price})" class="p-4 border-b border-slate-50 hover:bg-blue-50 font-black uppercase text-sm flex justify-between items-center transition-colors">
                        <span>${m.name}</span>
                        <span class="text-blue-600 font-bold">₹${m.price}</span>
                    </div>`;
                }).join('');
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); renderAdjustmentGrid(val); }
        }

        function selectProduct(name, price) {
            document.getElementById('pName').value = name;
            document.getElementById('pPrice').value = price;
            document.getElementById('suggestBox').classList.add('hidden');
            window.tempAdjustments = {}; 
            renderAdjustmentGrid(name);
        }

        function renderAdjustmentGrid(modelName) {
            const container = document.getElementById('adjustmentContainer');
            if (!modelName) {
                container.innerHTML = `<div class="text-center py-24 opacity-20"><i class="fas fa-search text-6xl mb-4 block"></i><p class="font-black uppercase text-xs tracking-widest">Search a model to start</p></div>`;
                return;
            }

            container.innerHTML = window.inventoryData.locations.map(loc => {
                const item = (window.inventoryData.stock[loc] || []).find(i => i.name === modelName.toUpperCase());
                const currentQty = item ? item.qty : 0;
                const adjustment = window.tempAdjustments[loc] || 0;
                const finalQty = currentQty + adjustment;

                return `
                <div class="bg-white p-5 rounded-[2.2rem] shadow-sm border border-slate-200 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2 duration-200">
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${loc}</p>
                        <div class="flex items-center gap-2">
                            <span class="text-3xl font-black ${finalQty < 0 ? 'text-red-500' : 'text-slate-900'}">${finalQty}</span>
                            <span class="text-[10px] font-bold text-slate-300">IN STOCK</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 bg-slate-100 p-2 rounded-[1.5rem]">
                        <button onclick="adjust('${loc}', -1)" class="qty-btn w-12 h-12 bg-white rounded-2xl shadow-sm text-red-500 flex items-center justify-center text-xl">
                            <i class="fas fa-minus"></i>
                        </button>
                        
                        <div class="min-w-[40px] text-center">
                            <span class="text-xs font-black ${adjustment >= 0 ? 'text-blue-600' : 'text-red-600'}">
                                ${adjustment > 0 ? '+' : ''}${adjustment}
                            </span>
                        </div>

                        <button onclick="adjust('${loc}', 1)" class="qty-btn w-12 h-12 bg-white rounded-2xl shadow-sm text-green-600 flex items-center justify-center text-xl">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function adjust(loc, val) {
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            if (!window.tempAdjustments[loc]) window.tempAdjustments[loc] = 0;
            window.tempAdjustments[loc] += val;
            renderAdjustmentGrid(document.getElementById('pName').value);
        }

        async function commitChanges() {
            const name = document.getElementById('pName').value.toUpperCase().trim();
            const price = parseFloat(document.getElementById('pPrice').value);
            const btn = document.getElementById('saveBtn');

            if (!name || isNaN(price)) return alert("Set Model and Price!");

            // Lock UI
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> SYNCING DATA...`;

            // Prepare local update
            window.inventoryData.locations.forEach(loc => {
                if (!window.inventoryData.stock[loc]) window.inventoryData.stock[loc] = [];
                let list = window.inventoryData.stock[loc];
                let item = list.find(i => i.name === name);
                const change = window.tempAdjustments[loc] || 0;

                if (item) {
                    item.qty = Math.max(0, item.qty + change);
                    item.price = price;
                } else if (change > 0) {
                    list.push({ id: Date.now() + Math.random(), name: name, qty: change, price: price });
                }
            });

            // Save and Unlock
            const success = await window.saveToFirebase(window.inventoryData);
            
            if (success) {
                // UI Clean Up
                document.getElementById('successCard').classList.add('show');
                setTimeout(() => {
                    document.getElementById('successCard').classList.remove('show');
                    document.getElementById('pName').value = "";
                    document.getElementById('pPrice').value = "";
                    window.tempAdjustments = {};
                    window.isSaving = false;
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-layer-group"></i> SAVE ALL CHANGES`;
                    renderAdjustmentGrid("");
                    document.getElementById('pName').focus();
                }, 1200);
            }
        }

        // Close suggestions
        window.onclick = (e) => {
            if (!e.target.closest('#pName')) document.getElementById('suggestBox').classList.add('hidden');
        };
    </script>
</body>
</html>
